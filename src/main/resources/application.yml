spring:
  application:
    name: warehouse-management
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  address: ${WMS_SERVER_ADDRESS:0.0.0.0}
  port: ${WMS_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  structured:
    format:
      console: logstash
  include-application-name: true

wms:
  task:
    stuck-threshold: ${WMS_TASK_STUCK_THRESHOLD:PT30M}
  auth:
    token-ttl: ${WMS_AUTH_TOKEN_TTL:PT8H}
  dashboard:
    poll-interval: ${WMS_DASHBOARD_POLL_INTERVAL:PT2S}
  mfc:
    adapter: ${WMS_MFC_ADAPTER:noop}
    telegram:
      base-url: ${WMS_MFC_TELEGRAM_BASE_URL:}
      retry-interval: ${WMS_MFC_TELEGRAM_RETRY_INTERVAL:PT30S}
      max-attempts: ${WMS_MFC_TELEGRAM_MAX_ATTEMPTS:5}
    transport:
      source-location: ${WMS_MFC_TRANSPORT_SOURCE_LOCATION:}
      destination-location: ${WMS_MFC_TRANSPORT_DESTINATION_LOCATION:}
