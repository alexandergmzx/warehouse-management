spring:
  application:
    name: warehouse-management
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  address: ${WMS_SERVER_ADDRESS:0.0.0.0}
  port: ${WMS_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  structured:
    format:
      console: logstash
  include-application-name: true

wms:
  task:
    stuck-threshold: ${WMS_TASK_STUCK_THRESHOLD:PT30M}
  auth:
    token-ttl: ${WMS_AUTH_TOKEN_TTL:PT8H}
